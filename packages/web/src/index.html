<!DOCTYPE html>
<!--
  @flatppl/web — gallery shell entry point.

  Three-pane layout:
    - left:   file tree (populated from a manifest fetched at startup,
              wired in step 1.4)
    - middle: source view (read-only; syntax highlighting added in
              step 1.5)
    - right:  the FlatPPL DAG / plot viewer

  This step (1.2) wires the layout itself and mounts the viewer
  against an inline source string so the integration works end-to-end
  before fetch and the manifest land.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlatPPL</title>
  <link rel="stylesheet" href="style.css">
  <!-- Temml's MathML companion stylesheet — sets a font-family
       chain over locally-installed math fonts (Cambria Math, STIX
       Two Math, Noto Sans Math, browser `math` generic) and applies
       small inter-symbol spacing fixes. The `Temml.woff2` font file
       it references is lazy-loaded by the browser only if a
       `\mathcal{...}` glyph actually appears; no Google Fonts / CDN. -->
  <link rel="stylesheet" href="vendor/temml.css">
</head>
<body>
  <div id="app">
    <header id="app-header">
      <button id="toggle-files" type="button"
              aria-expanded="true" title="Hide file list">
        <span aria-hidden="true">&#9776;</span>
      </button>
      <button id="nav-back" type="button" title="Back (Alt+Left)">
        <span aria-hidden="true">&#8249;</span>
      </button>
      <button id="nav-forward" type="button" title="Forward (Alt+Right)">
        <span aria-hidden="true">&#8250;</span>
      </button>
      <span id="app-title">FlatPPL</span>
    </header>

    <aside class="pane" id="files-pane">
      <div class="pane-header pane-header--row">
        <span class="pane-header-text">Files</span>
        <button id="new-file-btn" type="button"
                title="New ephemeral file (session-only, not saved to disk)"
                aria-label="New file"
                hidden>
          <span aria-hidden="true">+</span>
        </button>
        <button id="upload-btn" type="button"
                title="Upload .flatppl files (or drag-and-drop into the file list)"
                aria-label="Upload"
                hidden>
          <span aria-hidden="true">&#128228;</span>
        </button>
      </div>
      <div class="pane-body" id="file-tree">
        <div class="pane-placeholder">File tree appears here once a manifest is loaded.</div>
      </div>
    </aside>

    <section class="pane" id="source-pane">
      <div class="pane-header pane-header--row">
        <span id="source-header" class="pane-header-text">Source</span>
        <button id="edit-toggle" type="button"
                title="Toggle edit mode"
                aria-label="Toggle edit mode"
                aria-pressed="false"
                hidden>
          <span aria-hidden="true">&#9998;</span>
        </button>
        <button id="save-btn" type="button"
                title="Save to user/ (Ctrl/Cmd+S)"
                aria-label="Save"
                hidden>
          <span aria-hidden="true">&#128190;</span>
        </button>
        <button id="download-btn" type="button"
                title="Download this file"
                aria-label="Download">
          <span aria-hidden="true">&#128229;</span>
        </button>
        <button id="delete-btn" type="button"
                title="Delete this file from user/"
                aria-label="Delete"
                hidden>
          <span aria-hidden="true">&#128465;</span>
        </button>
        <button id="show-module-btn" type="button"
                title="Visualize whole module"
                aria-label="Visualize whole module"
                hidden>
          <img src="media/visualize-module-dark.svg"
               alt="" width="16" height="16">
        </button>
        <button id="tools-btn" type="button"
                title="Tools"
                aria-label="Tools"
                aria-haspopup="true"
                aria-expanded="false"
                hidden>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round"
               stroke-linejoin="round" aria-hidden="true">
            <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
          </svg>
        </button>
      </div>
      <div class="pane-body">
        <!-- Unified source viewer + editor (CodeMirror 6). View mode
             starts read-only; the edit-toggle button flips it to
             writable in deploys with allowEdit=true. -->
        <div id="source-editor"></div>
      </div>
    </section>

    <section class="pane" id="viewer-pane">
      <div class="pane-header">Visualization</div>
      <div class="pane-body">
        <!-- Neutral surface container: the PaneController mounts a
             file-type-dependent surface here (FlatPPL viewer / Markdown
             preview / placeholder). Renamed from #flatppl-viewer-root so
             no type is privileged AND the viewer's auto-mount (keyed on
             that id) stays inert in the gallery — the controller owns
             mounting. -->
        <div id="surface-root"></div>
      </div>
    </section>
  </div>

  <script src="vendor/cytoscape.min.js"></script>
  <script src="vendor/dagre.min.js"></script>
  <script src="vendor/cytoscape-dagre.js"></script>
  <script src="vendor/cytoscape-layers.min.js"></script>
  <script src="vendor/cytoscape-bubblesets.min.js"></script>
  <script src="vendor/echarts.min.js"></script>
  <script src="vendor/engine.min.js"></script>
  <script>
    // Host config consumed by the viewer when it loads. Same shape as
    // the VS Code bootstrap; only the sampler-worker URL is required.
    window.__FLATPPL_CONFIG__ = {
      samplerWorkerUrl: new URL('vendor/sampler-worker.min.js', document.baseURI).href,
      // allowEdit: when true, the gallery exposes an edit-mode
      // toggle in the source-pane header. The unified source surface
      // is CodeMirror in either mode; the toggle flips between
      // view-only (readOnly + non-editable) and editable. Edits
      // are session-only; nothing is persisted to disk. With
      // allowEdit false the toggle button stays hidden and the
      // editor stays permanently in view mode.
      //
      // Default mode within a deploy is view-only — the user opts
      // into editing via the toggle. The user's last choice is
      // remembered in localStorage so it survives reloads.
      //
      // Reusers of @flatppl/web flip allowEdit to false in their
      // own bootstrap to ship a strictly read-only gallery.
      allowEdit: true,
    };
  </script>
  <!-- Build-time feature flags (generated by build.mjs): merges e.g.
       { convert: true|false } into __FLATPPL_CONFIG__. Loaded right after the
       inline config so the merge wins, and before app.js reads it. The
       gallery's convert state is decided at build time, not probed at runtime. -->
  <script src="build-flags.js"></script>
  <script src="vendor/viewer.js"></script>
  <!-- CodeMirror bundle: now loaded eagerly because it powers the
       unified source-view surface (read-only and edit modes share
       the same instance). Previously this was fetched lazily from
       editor.js on the first edit-toggle click; the gallery now
       always needs it on first source render. -->
  <script src="vendor/codemirror.min.js"></script>
  <!-- Optional: FlatPPL TextMate highlighter (vendored from flatppl-grammars at
       build time). Absent if the grammars repo lacks the CM module; the editor
       degrades to plain text + binding overlay. -->
  <script src="vendor/textmate-highlight.js"></script>
  <!-- Shared file-type / tree-bucket helpers (window.FlatPPLFileTypes),
       the single source of truth used by both build.mjs and the web
       sub-modules below. Must load before surfaces.js / app.js. -->
  <script src="vendor/file-types.js"></script>
  <script src="ephemeral.js"></script>
  <script src="user-store.js"></script>
  <script src="resolver.js"></script>
  <script src="surfaces.js"></script>
  <script src="router.js"></script>
  <script src="manifest.js"></script>
  <script src="layout.js"></script>
  <script src="editor.js"></script>
  <script src="app.js"></script>
</body>
</html>
