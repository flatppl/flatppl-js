version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    commit-message:
      prefix: build
    groups:
      npm:
        patterns:
          - "*"
    cooldown:
      default-days: 7
      semver-major-days: 14
