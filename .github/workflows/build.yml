name: Build VSIX

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Only one VSIX build per ref. cancel-in-progress so a rapid run of
# pushes to main doesn't leave two jobs racing to push the shared
# `nightly` release tag (action-gh-release below) — the later commit
# wins, the earlier is cancelled.
concurrency:
  group: build-vsix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GRAMMARS_DIR: ${{ github.workspace }}/.grammars
    steps:
      - uses: actions/checkout@v6

      - name: Check out flatppl-grammars (deterministic grammar source)
        uses: actions/checkout@v6
        with:
          repository: flatppl/flatppl-grammars
          ref: main
          path: .grammars

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm install -g @vscode/vsce

      - name: Install workspace dev dependencies
        run: npm ci

      # NOTE: engine correctness is covered by the separate `Test` workflow
      # (test.yml). This job only needs the engine to BUNDLE, not pass tests —
      # `build:vendor` below is the real packaging prerequisite.
      - name: Build vendored libs + engine bundle + grammars
        run: npm run build:vendor

      - name: Package extension
        run: |
          cd packages/vscode-extension
          vsce package -o ../../flatppl-vscode-extension-nightly.vsix --no-git-tag-version --no-dependencies

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: flatppl-vscode-extension-nightly
          path: flatppl-vscode-extension-nightly.vsix

      - name: Update nightly release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: nightly
          name: Nightly Build
          prerelease: true
          files: flatppl-vscode-extension-nightly.vsix
          body: |
            Nightly build of the FlatPPL VS Code extension.
            Built from commit ${{ github.sha }}.

            Install with:
            ```
            curl -L https://github.com/${{ github.repository }}/releases/download/nightly/flatppl-vscode-extension-nightly.vsix -o flatppl-vscode-extension-nightly.vsix
            code --install-extension flatppl-vscode-extension-nightly.vsix
            ```
