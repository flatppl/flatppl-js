name: Build VSIX

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# One VSIX build per ref; a later push to main cancels an in-flight one so two
# jobs don't race to push the shared `nightly` release tag.
concurrency:
  group: build-vsix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build flatppl-lsp from flatppl-rust SOURCE (tip of main) for every target,
  # each on its native runner (macOS/Windows can't be cross-built from Linux).
  # Hand the binaries to the package job as artifacts — NOT via the published
  # nightly release.
  lsp:
    name: lsp (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-musl, os: ubuntu-latest }
          - { target: aarch64-unknown-linux-musl, os: ubuntu-24.04-arm }
          - { target: x86_64-apple-darwin, os: macos-latest }
          - { target: aarch64-apple-darwin, os: macos-latest }
          - { target: x86_64-pc-windows-msvc, os: windows-latest }
    steps:
      - name: Check out flatppl-rust (tip of main)
        uses: actions/checkout@v6
        with:
          repository: flatppl/flatppl-rust
          ref: main

      - name: Install musl linker
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: lsp-${{ matrix.target }}

      - name: Build flatppl-lsp
        run: cargo build --release --locked -p flatppl-lsp --target ${{ matrix.target }}

      - name: Stage binary under its triple name
        shell: bash
        run: |
          mkdir -p dist
          case "${{ matrix.target }}" in
            *windows*) cp "target/${{ matrix.target }}/release/flatppl-lsp.exe" "dist/flatppl-lsp-${{ matrix.target }}.exe" ;;
            *)         cp "target/${{ matrix.target }}/release/flatppl-lsp"     "dist/flatppl-lsp-${{ matrix.target }}" ;;
          esac

      - name: Upload LSP binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: flatppl-lsp-${{ matrix.target }}
          path: dist/flatppl-lsp-*

  package:
    name: Package universal VSIX
    needs: lsp
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GRAMMARS_DIR: ${{ github.workspace }}/.grammars
      FLATPPL_LSP_BIN_DIR: ${{ github.workspace }}/.lsp-bin
    steps:
      - uses: actions/checkout@v6

      - name: Check out flatppl-grammars (deterministic grammar source)
        uses: actions/checkout@v6
        with:
          repository: flatppl/flatppl-grammars
          ref: main
          path: .grammars

      - name: Collect LSP binaries
        uses: actions/download-artifact@v8
        with:
          path: .lsp-bin
          pattern: flatppl-lsp-*
          merge-multiple: true

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install workspace dev dependencies
        run: npm ci

      - name: Build + package universal VSIX
        # package:vsix runs build:vendor (bundles engine/grammars + stages the
        # five LSP binaries from FLATPPL_LSP_BIN_DIR) then `vsce package`.
        run: npm run package:vsix --workspace=flatppl

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: flatppl-vscode-extension-nightly
          path: flatppl-vscode-extension-nightly.vsix

      - name: Update nightly release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: nightly
          name: Nightly Build
          prerelease: true
          files: flatppl-vscode-extension-nightly.vsix
          body: |
            Nightly build of the FlatPPL VS Code extension.
            Built from commit ${{ github.sha }}; LSP built from flatppl-rust@main.

            Install with:
            ```
            curl -L https://github.com/${{ github.repository }}/releases/download/nightly/flatppl-vscode-extension-nightly.vsix -o flatppl-vscode-extension-nightly.vsix
            code --install-extension flatppl-vscode-extension-nightly.vsix
            ```
