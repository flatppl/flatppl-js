name: Build VSIX

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# One VSIX build per ref; a later push to main cancels an in-flight one so two
# jobs don't race to push the shared `nightly` release tag.
concurrency:
  group: build-vsix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build flatppl-lsp from flatppl-rust SOURCE (tip of main) for every target,
  # each on its native runner (macOS/Windows can't be cross-built from Linux).
  # Hand the binaries to the package job as artifacts — NOT via the published
  # nightly release.
  lsp:
    name: lsp (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-musl, os: ubuntu-latest }
          - { target: aarch64-unknown-linux-musl, os: ubuntu-24.04-arm }
          - { target: x86_64-apple-darwin, os: macos-latest }
          - { target: aarch64-apple-darwin, os: macos-latest }
          - { target: x86_64-pc-windows-msvc, os: windows-latest }
    steps:
      - name: Check out flatppl-rust (tip of main)
        uses: actions/checkout@v7
        with:
          repository: flatppl/flatppl-rust
          ref: main

      - name: Install musl linker
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: lsp-${{ matrix.target }}

      - name: Build flatppl-lsp
        run: cargo build --profile release-size --locked -p flatppl-lsp --target ${{ matrix.target }}

      - name: Stage binary under its triple name
        shell: bash
        run: |
          mkdir -p dist
          case "${{ matrix.target }}" in
            *windows*) cp "target/${{ matrix.target }}/release-size/flatppl-lsp.exe" "dist/flatppl-lsp-${{ matrix.target }}.exe" ;;
            *)         cp "target/${{ matrix.target }}/release-size/flatppl-lsp"     "dist/flatppl-lsp-${{ matrix.target }}" ;;
          esac

      - name: Upload LSP binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: flatppl-lsp-${{ matrix.target }}
          path: dist/flatppl-lsp-*

  # Package ONE platform-specific vsix per target — each bundles only its own
  # flatppl-lsp binary (vsce --target). VS Code installs the matching one; the
  # install.sh/install.ps1 scripts pick it for manual installs.
  package:
    name: Package VSIX (${{ matrix.vsce_target }})
    needs: lsp
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - { triple: x86_64-unknown-linux-musl,  vsce_target: linux-x64 }
          - { triple: aarch64-unknown-linux-musl, vsce_target: linux-arm64 }
          - { triple: x86_64-apple-darwin,        vsce_target: darwin-x64 }
          - { triple: aarch64-apple-darwin,       vsce_target: darwin-arm64 }
          - { triple: x86_64-pc-windows-msvc,     vsce_target: win32-x64 }
    env:
      GRAMMARS_DIR: ${{ github.workspace }}/.grammars
      FLATPPL_LSP_BIN_DIR: ${{ github.workspace }}/.lsp-bin
    steps:
      - uses: actions/checkout@v7

      - name: Check out flatppl-grammars (deterministic grammar source)
        uses: actions/checkout@v7
        with:
          repository: flatppl/flatppl-grammars
          ref: main
          path: .grammars

      - name: Collect this target's LSP binary only
        uses: actions/download-artifact@v8
        with:
          path: .lsp-bin
          pattern: flatppl-lsp-${{ matrix.triple }}
          merge-multiple: true

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install workspace dev dependencies
        run: npm ci

      - name: Build vendor bundle (stages the single binary from FLATPPL_LSP_BIN_DIR)
        run: npm run build:vendor --workspace=flatppl

      - name: Package platform-specific VSIX
        # vsce (@vscode/vsce) is a root devDependency; npx resolves it from the
        # hoisted node_modules. Run from the package dir so it packages this pkg.
        run: npx vsce package --target ${{ matrix.vsce_target }} -o flatppl-vscode-${{ matrix.vsce_target }}-nightly.vsix --no-dependencies
        working-directory: packages/vscode-extension

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: vsix-${{ matrix.vsce_target }}
          path: packages/vscode-extension/flatppl-vscode-${{ matrix.vsce_target }}-nightly.vsix

  # Single release job: collect all platform vsixes + the install scripts and
  # attach them to the nightly release in ONE write (avoids matrix jobs racing
  # on the shared release tag).
  release:
    name: Update nightly release
    needs: package
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Collect all platform vsixes
        uses: actions/download-artifact@v8
        with:
          path: .vsix
          pattern: vsix-*
          merge-multiple: true

      - name: Update nightly release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: nightly
          name: Nightly Build
          prerelease: true
          files: |
            .vsix/flatppl-vscode-*-nightly.vsix
            packages/vscode-extension/install.sh
            packages/vscode-extension/install.ps1
          body: |
            Nightly build of the FlatPPL VS Code extension (built from ${{ github.sha }}; LSP from flatppl-rust@main).

            Install (auto-detects your platform):
            ```
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/nightly/install.sh | sh
            ```
            Windows (PowerShell):
            ```
            irm https://github.com/${{ github.repository }}/releases/download/nightly/install.ps1 | iex
            ```
