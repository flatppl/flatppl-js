name: Deploy web gallery to GitHub Pages

# Builds packages/web/dist/ on every push to main and deploys it to
# GitHub Pages. The deployed URL is
#   https://<owner>.github.io/<repo>/
# Local-relative URLs in the gallery (`fetch('models.json')`,
# `<script src="vendor/...">`, `#model=demo/...`) work transparently
# under that base path — nothing in the page hard-codes an origin.
#
# One-time repo setup (not automated here): the repository's Pages
# settings must select "GitHub Actions" as the deploy source rather
# than "Deploy from a branch". Settings → Pages → Build and
# deployment → Source: GitHub Actions. After that, this workflow
# fully owns the deploy.

on:
  push:
    branches: [main]
  workflow_dispatch:

# The GITHUB_TOKEN needs `pages: write` to publish and `id-token: write`
# to authenticate with the Pages OIDC trust relationship. `contents: read`
# is the default everything else needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deploy. cancel-in-progress: true so that a
# rapid succession of pushes deploys the latest commit immediately
# rather than queueing — Pages deploys are atomic (the artifact
# upload + deploy step replace the served content as a unit), so a
# cancelled in-progress run can't leave the live site half-updated.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GRAMMARS_DIR: ${{ github.workspace }}/.grammars
      # flatppl-rust sibling for the convert wasm-api build (web/build.mjs
      # honours FLATPPL_RUST_DIR over the default ../flatppl-rust location).
      FLATPPL_RUST_DIR: ${{ github.workspace }}/.flatppl-rust
      # Pinned so the wasm-pack install is reproducible.
      WASM_PACK_VERSION: '0.15.0'
      # Harden cargo downloads against transient crates.io HTTP/2 flakiness
      # ("[16] Error in the HTTP2 framing layer"): retry more, and drop HTTP/2
      # multiplexing (the documented workaround for that specific curl error).
      CARGO_NET_RETRY: '10'
      CARGO_HTTP_MULTIPLEXING: 'false'
      # Hide the "Test cases" folder (demo/ + test-cases/ feature tests) in the
      # public deploy; local dev leaves it unset so the tests stay visible.
      FLATPPL_HIDE_TEST_EXAMPLES: '1'
    steps:
      - uses: actions/checkout@v7

      - name: Check out flatppl-grammars (deterministic grammar source)
        uses: actions/checkout@v7
        with:
          repository: flatppl/flatppl-grammars
          ref: main
          path: .grammars

      - name: Check out flatppl-rust (convert wasm-api source)
        uses: actions/checkout@v7
        with:
          repository: flatppl/flatppl-rust
          ref: main
          path: .flatppl-rust

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install workspace dependencies
        run: npm ci

      # Convert is ON by default; the deployed gallery cross-compiles
      # flatppl-wasm-api to wasm32 from the flatppl-rust sibling. Same toolchain
      # conventions as flatppl-rust's own CI.
      - name: Install Rust toolchain (+ wasm32 target for the convert build)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .flatppl-rust

      - name: Install wasm-pack (prebuilt, for the Convert command)
        uses: taiki-e/install-action@v2.83.3
        with:
          tool: wasm-pack@${{ env.WASM_PACK_VERSION }}

      - name: Build web package
        run: npm run build --workspace=packages/web

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: packages/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
