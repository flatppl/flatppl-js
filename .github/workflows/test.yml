name: Test

# Runs the engine unit tests on every push and pull request, plus a
# smoke build of the web and vscode-extension packages so a regression
# that breaks bundling (missing export, ESM/CJS mistake, vendored-lib
# path drift) shows up before it hits a release or a Pages deploy.
#
# Fast and standalone: skips the VSIX packaging and Pages deploy
# (those live in build.yml and pages.yml respectively, gated to
# main). This workflow exists to give developers running on any
# branch the same green / red signal.

on:
  push:
  pull_request:

# Cancel an in-flight run when a new commit lands on the same ref —
# the previous result is uninteresting.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GRAMMARS_DIR: ${{ github.workspace }}/.grammars
      # flatppl-rust sibling, used to build BOTH the LSP (build:vendor) and the
      # convert wasm-api (web build). build-vendor.mjs + web/build.mjs honour
      # FLATPPL_RUST_DIR over the default ../flatppl-rust sibling location.
      FLATPPL_RUST_DIR: ${{ github.workspace }}/.flatppl-rust
      # Pinned so the wasm-pack cache key is stable and the install reproducible.
      WASM_PACK_VERSION: '0.15.0'
    steps:
      - uses: actions/checkout@v7

      - name: Check out flatppl-grammars (deterministic grammar source)
        uses: actions/checkout@v7
        with:
          repository: flatppl/flatppl-grammars
          ref: main
          path: .grammars

      - name: Check out flatppl-rust (LSP + convert wasm-api source)
        uses: actions/checkout@v7
        with:
          repository: flatppl/flatppl-rust
          ref: main
          path: .flatppl-rust

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install workspace dependencies
        run: npm ci

      - name: Typecheck
        # tsc across every workspace with a typecheck script
        # (--workspaces --if-present). Catches type errors the esbuild
        # bundle step below would miss — esbuild strips types without
        # checking them.
        #
        # NON-BLOCKING by choice: the tree currently typechecks clean,
        # but the step is kept advisory (surfaces red in the run without
        # failing the job) so a type regression doesn't block the Test
        # workflow. Flip off continue-on-error to make it a hard gate.
        continue-on-error: true
        run: npm run typecheck

      - name: Run engine tests with coverage
        # npm run test:coverage at the root delegates to every
        # workspace's `test:coverage` script via --workspaces
        # --if-present. Each workspace's script writes an LCOV
        # report to packages/<name>/coverage/lcov.info; the
        # Codecov upload step below picks all of them up via glob.
        # Today only packages/engine has tests; new packages with
        # test:coverage scripts are picked up automatically.
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        # Codecov auto-detects LCOV files; we point it at the
        # per-workspace outputs explicitly so a missing report in a
        # less-tested workspace doesn't get silently skipped. For
        # public repos the upload works without CODECOV_TOKEN; set
        # the secret if rate-limited or for a private fork.
        uses: codecov/codecov-action@v7
        with:
          files: packages/engine/coverage/lcov.info
          # Upload only the file named above. Without this the action
          # also auto-searches the tree and sweeps up c8's per-process
          # v8 coverage fragments (~171 stray reports), defeating the
          # explicit `files:` narrowing.
          disable_search: true
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Cache Rust deps (flatppl-rust LSP + convert wasm builds)
        # Caches the cargo registry + .flatppl-rust/target so the LSP
        # (build:vendor) and the wasm crate builds don't recompile serde /
        # salsa / wasm-bindgen / … every run. Same action flatppl-rust's own CI
        # uses. cache-bin: false — wasm-pack is cached separately, below, on a
        # stable version key (so an unrelated Cargo.lock change won't evict it).
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .flatppl-rust
          cache-bin: false

      - name: Cache wasm-pack (skip the from-source rebuild on repeat runs)
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/wasm-pack
          key: wasm-pack-${{ runner.os }}-${{ env.WASM_PACK_VERSION }}

      - name: Install the wasm build toolchain (for the Convert command)
        # Convert is ON by default; the web build cross-compiles
        # flatppl-wasm-api to wasm32 from the flatppl-rust sibling. cargo +
        # rustup are preinstalled on the runner — add the wasm32 target, and
        # build wasm-pack from source (matching the local build's no-prebuilt
        # stance) unless the cache above already restored it. The build itself
        # never installs toolchain components.
        run: |
          rustup target add wasm32-unknown-unknown
          command -v wasm-pack >/dev/null \
            || cargo install wasm-pack --version "$WASM_PACK_VERSION" --locked

      - name: Build web package
        # End-to-end smoke: confirms the resolver, bundler, and
        # vendored-asset paths all line up. Builds the convert wasm-api from the
        # flatppl-rust sibling (FLATPPL_RUST_DIR). No tests here yet —
        # add them under packages/web/test when they land.
        run: npm run build --workspace=packages/web

      - name: Build vscode-extension lib (vendor + engine bundle)
        # Same smoke for the extension's lib/ output. Verifies the
        # esbuild bundle resolves every engine import and the
        # third-party-licenses generator finds every dep.
        run: npm run build:vendor
